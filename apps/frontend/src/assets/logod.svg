<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" width="100%" height="100%">
  <defs>
    <style>
      <![CDATA[
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@800&display=swap');

      /* --- CSS Variables for Auto Dark/Light Mode --- */
      :root {
        --bg-color: transparent;
        --text-primary: #111827;
        --text-ai-1: #2563EB;
        --text-ai-2: #06B6D4;
        --chart-bar-bg: #F3F4F6;
        --chart-bar-fill: #E5E7EB;
        --chart-line: #2563EB;
        --chart-node: #111827;
        --success: #10B981;
        --glow: rgba(37, 99, 235, 0.4);
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --text-primary: #F9FAFB;
          --text-ai-1: #60A5FA;
          --text-ai-2: #22D3EE;
          --chart-bar-bg: #1F2937;
          --chart-bar-fill: #374151;
          --chart-line: #60A5FA;
          --chart-node: #F9FAFB;
          --success: #34D399;
          --glow: rgba(96, 165, 250, 0.5);
        }
      }

      /* --- Global & Typography --- */
      .brand-text {
        font-family: 'Inter', system-ui, sans-serif;
        font-size: 48px;
        font-weight: 800;
        letter-spacing: -1.5px;
        fill: var(--text-primary);
      }
      .ai-highlight {
        fill: url(#ai-gradient);
        filter: drop-shadow(0 0 12px var(--glow));
      }

      /* --- Animation Timelines (8s Loop) --- */
      .text-group {
        transform-origin: 200px 60px;
        animation: text-sequence 8s cubic-bezier(0.65, 0, 0.35, 1) infinite;
      }

      .chart-group {
        transform-origin: 200px 60px;
        animation: chart-sequence 8s cubic-bezier(0.65, 0, 0.35, 1) infinite;
        opacity: 0;
      }

      .chart-bar {
        transform-origin: 0px 100px;
        animation: bar-grow 8s cubic-bezier(0.65, 0, 0.35, 1) infinite;
      }
      .bar-1 { animation-delay: 0s; }
      .bar-2 { animation-delay: 0.08s; }
      .bar-3 { animation-delay: 0.16s; }
      .bar-4 { animation-delay: 0.24s; }

      .chart-line {
        stroke-dasharray: 200;
        stroke-dashoffset: 200;
        animation: line-draw 8s cubic-bezier(0.65, 0, 0.35, 1) infinite;
      }

      .chart-node {
        transform-origin: center;
        animation: node-pop 8s cubic-bezier(0.34, 1.56, 0.64, 1) infinite;
      }
      /* Individual transform origins for nodes based on their exact cx/cy coordinates */
      .node-1 { transform-origin: 140px 85px; animation-delay: 0s; }
      .node-2 { transform-origin: 180px 65px; animation-delay: 0.08s; }
      .node-3 { transform-origin: 220px 45px; animation-delay: 0.16s; }
      .node-4 { transform-origin: 260px 15px; animation-delay: 0.24s; }

      .energy-pulse {
        stroke-dasharray: 40 200;
        stroke-dashoffset: 240;
        animation: pulse-travel 8s cubic-bezier(0.4, 0, 0.2, 1) infinite;
      }

      /* --- Keyframes --- */
      @keyframes text-sequence {
        0%, 25% { opacity: 1; transform: scale(1) skewX(0); }
        28% { opacity: 1; transform: scale(1.02) skewX(-2deg); }
        32%, 72% { opacity: 0; transform: scale(0.9) skewX(5deg); }
        76% { opacity: 1; transform: scale(1.03) skewX(-2deg); }
        80%, 100% { opacity: 1; transform: scale(1) skewX(0); }
      }

      @keyframes chart-sequence {
        0%, 30% { opacity: 0; transform: scale(0.9); }
        35%, 68% { opacity: 1; transform: scale(1); }
        72%, 100% { opacity: 0; transform: scale(0.9); }
      }

      @keyframes bar-grow {
        0%, 33% { transform: scaleY(0); }
        38%, 66% { transform: scaleY(1); }
        70%, 100% { transform: scaleY(0); }
      }

      @keyframes line-draw {
        0%, 36% { stroke-dashoffset: 200; }
        44%, 66% { stroke-dashoffset: 0; }
        70%, 100% { stroke-dashoffset: -200; }
      }

      @keyframes node-pop {
        0%, 38% { transform: scale(0); opacity: 0; }
        42% { transform: scale(1.2); opacity: 1; }
        45%, 65% { transform: scale(1); opacity: 1; }
        69%, 100% { transform: scale(0); opacity: 0; }
      }

      @keyframes pulse-travel {
        0%, 48% { stroke-dashoffset: 240; opacity: 0; }
        49% { opacity: 1; filter: drop-shadow(0 0 6px var(--text-ai-2)); }
        59% { stroke-dashoffset: -40; opacity: 1; filter: drop-shadow(0 0 10px var(--text-ai-1)); }
        60%, 100% { opacity: 0; }
      }
      ]]>
    </style>

    <linearGradient id="ai-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="var(--text-ai-1)" />
      <stop offset="100%" stop-color="var(--text-ai-2)" />
    </linearGradient>

    <linearGradient id="energy-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="var(--text-ai-2)" stop-opacity="0" />
      <stop offset="50%" stop-color="var(--text-ai-2)" stop-opacity="1" />
      <stop offset="100%" stop-color="var(--text-ai-1)" stop-opacity="0" />
    </linearGradient>

    <filter id="pulse-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <rect width="100%" height="100%" fill="var(--bg-color)" />

  <g class="text-group">
    <text x="200" y="76" text-anchor="middle" class="brand-text">
      SmartBiz <tspan class="ai-highlight" dx="4">AI</tspan>
    </text>
  </g>

  <g class="chart-group">
    
    <rect x="134" y="85" width="12" height="15" rx="6" fill="var(--chart-bar-bg)" opacity="0.4" />
    <rect x="174" y="65" width="12" height="35" rx="6" fill="var(--chart-bar-bg)" opacity="0.4" />
    <rect x="214" y="45" width="12" height="55" rx="6" fill="var(--chart-bar-bg)" opacity="0.4" />
    <rect x="254" y="15" width="12" height="85" rx="6" fill="var(--chart-bar-bg)" opacity="0.4" />

    <rect class="chart-bar bar-1" x="134" y="85" width="12" height="15" rx="6" fill="var(--chart-bar-fill)" />
    <rect class="chart-bar bar-2" x="174" y="65" width="12" height="35" rx="6" fill="var(--chart-bar-fill)" />
    <rect class="chart-bar bar-3" x="214" y="45" width="12" height="55" rx="6" fill="var(--chart-bar-fill)" />
    <rect class="chart-bar bar-4" x="254" y="15" width="12" height="85" rx="6" fill="var(--chart-bar-fill)" />

    <path class="chart-line" 
          d="M 140 85 C 155 85, 160 65, 180 65 C 195 65, 200 45, 220 45 C 235 45, 240 15, 260 15" 
          fill="none" 
          stroke="var(--chart-line)" 
          stroke-width="4" 
          stroke-linecap="round" />

    <path class="energy-pulse" 
          d="M 140 85 C 155 85, 160 65, 180 65 C 195 65, 200 45, 220 45 C 235 45, 240 15, 260 15" 
          fill="none" 
          stroke="url(#energy-gradient)" 
          stroke-width="5" 
          stroke-linecap="round"
          filter="url(#pulse-glow)" />

    <circle class="chart-node node-1" cx="140" cy="85" r="4.5" fill="var(--chart-node)" stroke="var(--bg-color)" stroke-width="2" />
    <circle class="chart-node node-2" cx="180" cy="65" r="4.5" fill="var(--chart-node)" stroke="var(--bg-color)" stroke-width="2" />
    <circle class="chart-node node-3" cx="220" cy="45" r="4.5" fill="var(--chart-node)" stroke="var(--bg-color)" stroke-width="2" />
    
    <circle class="chart-node node-4" cx="260" cy="15" r="6" fill="var(--success)" stroke="var(--bg-color)" stroke-width="2.5" />
    
  </g>
</svg>