version: '3.8'

services:
  # ==================== PostgreSQL Database ====================
  postgres:
    image: postgres:16-alpine
    container_name: smartbiz-postgres
    environment:
      POSTGRES_USER: smartbiz_user
      POSTGRES_PASSWORD: smartbiz_password
      POSTGRES_DB: smartbiz_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d
    networks:
      - smartbiz-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smartbiz_user -d smartbiz_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # ==================== Backend API (NestJS) ====================
  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile.dev
    container_name: smartbiz-backend
    env_file:
      - ./apps/backend/.env
    environment:
      # Report AI: prefer XAI_API_KEY (Grok) in apps/backend/.env; else OPENROUTER_API_KEY.
      # Optional: XAI_MODEL, XAI_BASE_URL, OPENROUTER_MODEL, OPENROUTER_HTTP_REFERER
      - NODE_ENV=development
      - PORT=3000
      - DATABASE_URL=postgresql://smartbiz_user:smartbiz_password@postgres:5432/smartbiz_db
      - JWT_ACCESS_SECRET=your-super-secret-jwt-access-key-change-this-in-production
      - JWT_EXPIRES_IN=15m
      - JWT_REFRESH_SECRET=your-super-secret-jwt-refresh-key-change-this-in-production
      - JWT_REFRESH_EXPIRES_IN=7d
      - MAIL_HOST=${MAIL_HOST:-smtp.gmail.com}
      - MAIL_PORT=${MAIL_PORT:-587}
      - MAIL_USER=${MAIL_USER:-your-email@gmail.com}
      - MAIL_PASSWORD=${MAIL_PASSWORD:-your-gmail-app-password}
      - MAIL_FROM=${MAIL_FROM:-your-email@gmail.com}
      - FRONTEND_URL=http://localhost:5173
      - API_URL=http://localhost:3001/api/v1
      - ML_ENGINE_URL=http://ml-engine:8000
      - ML_API_KEY=dev-secret-key
      # GEMINI_MODEL and OPENROUTER_MODEL are set in apps/backend/.env
    ports:
      - "3001:3000"
      - "5555:5555"
    volumes:
      - ./apps/backend:/usr/src/app
      - backend_modules:/usr/src/app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - smartbiz-network
    command: sh -c "npx prisma migrate deploy && npx prisma generate && npm run start:dev"
    restart: unless-stopped

  # ==================== Frontend (React) ====================
  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
    container_name: smartbiz-frontend
    environment:
      - VITE_API_URL=http://localhost:3001/api/v1
    ports:
      - "5173:5173"
    volumes:
      - ./apps/frontend:/usr/src/app
      - frontend_modules:/usr/src/app/node_modules
    depends_on:
      - backend
    networks:
      - smartbiz-network
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    restart: unless-stopped

  # ==================== ML Engine (Python) ====================
  ml-engine:
    build:
      context: ./apps/ml-engine
      dockerfile: Dockerfile
    container_name: smartbiz-ml-engine
    environment:
      - PYTHONUNBUFFERED=1
      - DATABASE_URL=postgresql://smartbiz_user:smartbiz_password@postgres:5432/smartbiz_db
      - ML_API_KEY=dev-secret-key
    ports:
      - "8000:8000"
    volumes:
      - ./apps/ml-engine:/usr/src/app
      - ml_models:/usr/src/app/models
    depends_on:
      - postgres
    networks:
      - smartbiz-network
    command: python -m uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped

# ==================== Volumes ====================
volumes:
  postgres_data:
    driver: local
  backend_modules:
  frontend_modules:
  ml_models:

# ==================== Networks ====================
networks:
  smartbiz-network:
    driver: bridge
